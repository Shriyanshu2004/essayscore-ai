<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EssayScore AI - ER Diagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 36px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 18px;
        }
        
        .diagram-container {
            position: relative;
            width: 100%;
            height: 800px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            overflow: auto;
        }
        
        svg {
            width: 100%;
            height: 100%;
        }
        
        .entity {
            fill: white;
            stroke: #667eea;
            stroke-width: 2;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        
        .entity:hover {
            fill: #f0f4ff;
            stroke: #764ba2;
            stroke-width: 3;
        }
        
        .entity-title {
            fill: #667eea;
            font-weight: bold;
            font-size: 14px;
        }
        
        .entity-attr {
            fill: #333;
            font-size: 12px;
        }
        
        .pk {
            fill: #e74c3c;
            font-weight: bold;
        }
        
        .fk {
            fill: #3498db;
            font-weight: bold;
        }
        
        .relationship {
            stroke: #764ba2;
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead);
        }
        
        .relationship-label {
            fill: #764ba2;
            font-size: 11px;
            font-weight: bold;
        }
        
        .legend {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .legend h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .legend-item {
            display: inline-block;
            margin-right: 30px;
            margin-bottom: 10px;
        }
        
        .legend-color {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 3px;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 EssayScore AI</h1>
        <p class="subtitle">Entity-Relationship Diagram</p>
        
        <div class="diagram-container">
            <svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                        <polygon points="0 0, 10 3, 0 6" fill="#764ba2" />
                    </marker>
                </defs>
                
                <!-- STUDENTS Entity -->
                <g id="students">
                    <rect class="entity" x="50" y="50" width="180" height="140" rx="5"/>
                    <text class="entity-title" x="140" y="75" text-anchor="middle">STUDENTS</text>
                    <line x1="60" y1="85" x2="220" y2="85" stroke="#667eea" stroke-width="1"/>
                    <text class="entity-attr pk" x="60" y="105">PK: id</text>
                    <text class="entity-attr" x="60" y="120">name</text>
                    <text class="entity-attr" x="60" y="135">email</text>
                    <text class="entity-attr" x="60" y="150">grade_level</text>
                    <text class="entity-attr" x="60" y="165">enrolled_at</text>
                    <text class="entity-attr" x="60" y="180">status</text>
                </g>
                
                <!-- ASSIGNMENTS Entity -->
                <g id="assignments">
                    <rect class="entity" x="970" y="50" width="180" height="140" rx="5"/>
                    <text class="entity-title" x="1060" y="75" text-anchor="middle">ASSIGNMENTS</text>
                    <line x1="980" y1="85" x2="1140" y2="85" stroke="#667eea" stroke-width="1"/>
                    <text class="entity-attr pk" x="980" y="105">PK: id</text>
                    <text class="entity-attr" x="980" y="120">title</text>
                    <text class="entity-attr" x="980" y="135">description</text>
                    <text class="entity-attr" x="980" y="150">due_date</text>
                    <text class="entity-attr" x="980" y="165">word_limit</text>
                    <text class="entity-attr" x="980" y="180">created_at</text>
                </g>
                
                <!-- SUBMISSIONS Entity (Center) -->
                <g id="submissions">
                    <rect class="entity" x="480" y="250" width="200" height="140" rx="5"/>
                    <text class="entity-title" x="580" y="275" text-anchor="middle">SUBMISSIONS</text>
                    <line x1="490" y1="285" x2="670" y2="285" stroke="#667eea" stroke-width="1"/>
                    <text class="entity-attr pk" x="490" y="305">PK: id</text>
                    <text class="entity-attr fk" x="490" y="320">FK: student_id</text>
                    <text class="entity-attr fk" x="490" y="335">FK: assignment_id</text>
                    <text class="entity-attr" x="490" y="350">submitted_at</text>
                    <text class="entity-attr" x="490" y="365">word_count</text>
                    <text class="entity-attr" x="490" y="380">status</text>
                </g>
                
                <!-- ESSAYS Entity -->
                <g id="essays">
                    <rect class="entity" x="750" y="250" width="180" height="100" rx="5"/>
                    <text class="entity-title" x="840" y="275" text-anchor="middle">ESSAYS</text>
                    <line x1="760" y1="285" x2="920" y2="285" stroke="#667eea" stroke-width="1"/>
                    <text class="entity-attr pk" x="760" y="305">PK: id</text>
                    <text class="entity-attr" x="760" y="320">content</text>
                    <text class="entity-attr" x="760" y="335">(essay text)</text>
                </g>
                
                <!-- SCORES Entity -->
                <g id="scores">
                    <rect class="entity" x="480" y="470" width="200" height="140" rx="5"/>
                    <text class="entity-title" x="580" y="495" text-anchor="middle">SCORES</text>
                    <line x1="490" y1="505" x2="670" y2="505" stroke="#667eea" stroke-width="1"/>
                    <text class="entity-attr pk" x="490" y="525">PK: id</text>
                    <text class="entity-attr fk" x="490" y="540">FK: submission_id</text>
                    <text class="entity-attr" x="490" y="555">trait_name</text>
                    <text class="entity-attr" x="490" y="570">raw_score</text>
                    <text class="entity-attr" x="490" y="585">percentage</text>
                    <text class="entity-attr" x="490" y="600">grade</text>
                </g>
                
                <!-- PEER_REVIEWS Entity -->
                <g id="peer_reviews">
                    <rect class="entity" x="200" y="470" width="200" height="160" rx="5"/>
                    <text class="entity-title" x="300" y="495" text-anchor="middle">PEER_REVIEWS</text>
                    <line x1="210" y1="505" x2="390" y2="505" stroke="#667eea" stroke-width="1"/>
                    <text class="entity-attr pk" x="210" y="525">PK: id</text>
                    <text class="entity-attr fk" x="210" y="540">FK: submission_id</text>
                    <text class="entity-attr fk" x="210" y="555">FK: reviewer_id</text>
                    <text class="entity-attr" x="210" y="570">assigned_at</text>
                    <text class="entity-attr" x="210" y="585">completed_at</text>
                    <text class="entity-attr" x="210" y="600">status</text>
                    <text class="entity-attr" x="210" y="615">scores</text>
                </g>
                
                <!-- NOTIFICATIONS Entity -->
                <g id="notifications">
                    <rect class="entity" x="50" y="300" width="180" height="140" rx="5"/>
                    <text class="entity-title" x="140" y="325" text-anchor="middle">NOTIFICATIONS</text>
                    <line x1="60" y1="335" x2="220" y2="335" stroke="#667eea" stroke-width="1"/>
                    <text class="entity-attr pk" x="60" y="355">PK: id</text>
                    <text class="entity-attr fk" x="60" y="370">FK: student_id</text>
                    <text class="entity-attr" x="60" y="385">type</text>
                    <text class="entity-attr" x="60" y="400">title</text>
                    <text class="entity-attr" x="60" y="415">message</text>
                    <text class="entity-attr" x="60" y="430">created_at</text>
                </g>
                
                <!-- TRAIT_DEFINITIONS Entity -->
                <g id="traits">
                    <rect class="entity" x="750" y="470" width="180" height="120" rx="5"/>
                    <text class="entity-title" x="840" y="495" text-anchor="middle">TRAIT_DEFINITIONS</text>
                    <line x1="760" y1="505" x2="920" y2="505" stroke="#667eea" stroke-width="1"/>
                    <text class="entity-attr pk" x="760" y="525">PK: id</text>
                    <text class="entity-attr" x="760" y="540">trait_name</text>
                    <text class="entity-attr" x="760" y="555">description</text>
                    <text class="entity-attr" x="760" y="570">weight</text>
                    <text class="entity-attr" x="760" y="585">max_score</text>
                </g>
                
                <!-- Relationships -->
                
                <!-- Students to Submissions (1:N) -->
                <path class="relationship" d="M 230 120 L 480 320" />
                <text class="relationship-label" x="320" y="210">submits (1:N)</text>
                
                <!-- Students to Notifications (1:N) -->
                <path class="relationship" d="M 140 190 L 140 300" />
                <text class="relationship-label" x="150" y="240">receives (1:N)</text>
                
                <!-- Students to Peer Reviews (1:N) as reviewer -->
                <path class="relationship" d="M 140 190 L 300 470" />
                <text class="relationship-label" x="180" y="330">reviews (1:N)</text>
                
                <!-- Assignments to Submissions (1:N) -->
                <path class="relationship" d="M 970 120 L 680 320" />
                <text class="relationship-label" x="800" y="210">has (1:N)</text>
                
                <!-- Submissions to Essays (1:1) -->
                <path class="relationship" d="M 680 300 L 750 300" />
                <text class="relationship-label" x="690" y="290">contains (1:1)</text>
                
                <!-- Submissions to Scores (1:N) -->
                <path class="relationship" d="M 580 390 L 580 470" />
                <text class="relationship-label" x="590" y="430">scored_by (1:N)</text>
                
                <!-- Submissions to Peer Reviews (1:N) -->
                <path class="relationship" d="M 480 350 L 400 470" />
                <text class="relationship-label" x="410" y="410">reviewed_by (1:N)</text>
                
                <!-- Peer Reviews to Notifications (1:1) -->
                <path class="relationship" d="M 200 550 L 140 440" />
                <text class="relationship-label" x="150" y="490">creates (1:1)</text>
            </svg>
        </div>
        
        <div class="legend">
            <h3>Legend</h3>
            <div class="legend-item">
                <span class="legend-color" style="background: #e74c3c;"></span>
                <span>PK = Primary Key</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background: #3498db;"></span>
                <span>FK = Foreign Key</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background: #667eea;"></span>
                <span>Entity</span>
            </div>
            <div class="legend-item">
                <span class="legend-color" style="background: #764ba2;"></span>
                <span>Relationship</span>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value">8</div>
                <div class="stat-label">Total Entities</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">8</div>
                <div class="stat-label">Relationships</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">7</div>
                <div class="stat-label">Foreign Keys</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">JSON</div>
                <div class="stat-label">Storage Type</div>
            </div>
        </div>
    </div>
</body>
</html>
