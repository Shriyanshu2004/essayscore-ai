services:
  - type: web
    name: essayscore-backend
    env: python
    buildCommand: pip install -r requirements-minimal.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: https://essayscore-ai.vercel.app,https://essayscore-ai.vercel.app/

